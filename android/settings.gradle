pluginManagement { includeBuild("../node_modules/@react-native/gradle-plugin") }

plugins { id("com.facebook.react.settings") }
extensions.configure(com.facebook.react.ReactSettingsExtension){ ex -> ex.autolinkLibrariesFromCommand() }

// ensure all projects can resolve the async-storage shared_storage artifact
dependencyResolutionManagement {
    // This tells Gradle to ONLY use the repositories listed here
    repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS) 
    repositories {
        google()
        mavenCentral()
        maven {
            // Correct path for Async Storage local repo
            url("$rootDir/../node_modules/@react-native-async-storage/async-storage/android/local_repo")
        }
        maven { url 'https://www.jitpack.io' }
    }
}

rootProject.name = 'ACT1'
include ':app'
includeBuild('../node_modules/@react-native/gradle-plugin')
